services:
  - type: web
    name: emotion-ai-backend
    runtime: docker
    plan: starter  # Change to 'standard' or 'pro' for production
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GROQ_API_KEY
        sync: false  # Set this in Render dashboard
      - key: MODEL_DEVICE
        value: cpu
      - key: MODEL_WARMUP
        value: "true"
      - key: LOG_LEVEL
        value: INFO
      - key: MAX_IMAGE_SIZE_MB
        value: "8"
      - key: TORCH_NUM_THREADS
        value: "2"  # Optimize for limited CPU on Starter plan
    healthCheckPath: /health
    autoDeploy: true
