<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Emotion Detection - Webcam</title>
    <link rel="stylesheet" href="/static/css/image_emotion.css">
    <style>
        .video-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .video-wrapper {
            position: relative;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: var(--shadow-md);
            margin-bottom: 2rem;
        }
        
        #videoElement {
            width: 100%;
            max-width: 640px;
            height: auto;
            border-radius: 12px;
            background: #000;
            display: block;
            margin: 0 auto;
        }
        
        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }
        
        .emotion-display {
            text-align: center;
            margin-top: 2rem;
        }
        
        .emotion-label {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            text-transform: capitalize;
            transition: all 0.3s ease;
        }
        
        .confidence-bar {
            width: 100%;
            max-width: 400px;
            height: 8px;
            background: var(--border-color);
            border-radius: 4px;
            margin: 1rem auto;
            overflow: hidden;
        }
        
        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--success-color));
            transition: width 0.3s ease;
            border-radius: 4px;
        }
        
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 0.5rem;
            background: var(--error-color);
            animation: pulse 2s infinite;
        }
        
        .status-indicator.active {
            background: var(--success-color);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .error-message {
            color: var(--error-color);
            text-align: center;
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <h1 style="text-align: center; margin-bottom: 2rem;">Live Emotion Detection</h1>
        
        <div class="video-wrapper">
            <video id="videoElement" autoplay playsinline></video>
            
            <div class="controls">
                <button id="startBtn" class="primary-btn">
                    Start Camera
                </button>
                <button id="stopBtn" class="primary-btn" disabled>
                    Stop Camera
                </button>
            </div>
            
            <div class="emotion-display" id="emotionDisplay" style="display: none;">
                <div class="status-indicator active" id="statusIndicator"></div>
                <span id="statusText">Analyzing...</span>
                
                <div class="emotion-label" id="emotionLabel">Neutral</div>
                <div class="confidence-bar">
                    <div class="confidence-fill" id="confidenceFill" style="width: 0%"></div>
                </div>
                <div style="color: var(--text-secondary); margin-top: 0.5rem;">
                    Confidence: <span id="confidenceText">0%</span>
                </div>
            </div>
            
            <div id="errorMessage" class="error-message" style="display: none;"></div>
        </div>
    </div>

    <script src="/static/js/video_emotion.js"></script>
</body>
</html>
