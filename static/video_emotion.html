<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Real-Time Video Emotion Detection - Live webcam analysis">
    <title>🎥 Real-Time Emotion Detection</title>
    <link rel="stylesheet" href="/static/css/video_emotion.css?v=1.0" type="text/css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🎥 Real-Time Emotion Detection</h1>
            <p>Live webcam analysis with continuous emotion updates</p>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="btn-start" id="btnStart">Start Recording</button>
            <button class="btn-stop" id="btnStop" style="display: none;">Stop Recording</button>
        </div>

        <!-- Video Container -->
        <div class="video-container">
            <div class="video-box">
                <h2>📹 Video Feed</h2>
                <div class="video-wrapper">
                    <video id="videoFeed" autoplay playsinline></video>
                    <canvas id="videoCanvas"></canvas>
                    <div class="video-placeholder" id="videoPlaceholder">
                        <div class="placeholder-icon">📹</div>
                        <p>Click "Start Recording" to begin</p>
                    </div>
                </div>
            </div>
            
            <div class="video-box">
                <h2>😊 Current Emotion</h2>
                <div class="emotion-display">
                    <div class="emotion-label" id="emotionLabel">-</div>
                    <div class="confidence-bar">
                        <div class="confidence-fill" id="confidenceFill" style="width: 0%">
                            <span class="confidence-text" id="confidenceText">0%</span>
                        </div>
                    </div>
                </div>
                
                <!-- Stacked Histogram -->
                <div class="histogram-container" id="histogramContainer" style="display: none;">
                    <h3 class="histogram-title">Emotion Distribution</h3>
                    <div class="stacked-histogram" id="stackedHistogram"></div>
                </div>
                
                <!-- Facial Landmarks Toggle -->
                <div class="landmarks-control">
                    <label class="toggle-switch">
                        <input type="checkbox" id="showLandmarksToggle">
                        <span class="toggle-slider"></span>
                        <span class="toggle-label">Show Facial Points</span>
                    </label>
                </div>
                
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value" id="frameCount">0</div>
                        <div class="stat-label">Frames</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="duration">0s</div>
                        <div class="stat-label">Duration</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Status -->
        <div class="status-section">
            <h2>📊 Session Status</h2>
            <div class="status" id="status">
                <span class="status-indicator stopped"></span>
                <span class="status-text">Stopped</span>
            </div>
        </div>
    </div>

    <script src="/static/js/video_emotion_standalone.js"></script>
</body>
</html>
